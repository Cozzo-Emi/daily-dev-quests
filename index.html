<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Dev Quests</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>🔥 Daily Dev Quests</h1>
        <div id="progress-container">
            <p>Progreso: <span id="progress-text">0/20</span></p>
            <progress id="progress-bar" value="0" max="20"></progress>
        </div>
    </header>

    <main>
        <section id="question-card" class="card">
            <h2 id="question-text">Cargando desafío...</h2>
            <div id="options-container" class="options">
                </div>
        </section>

        <section id="feedback-container" class="feedback hidden">
            <h3 id="feedback-title"></h3>
            <p id="feedback-text"></p>
            <button id="next-btn">Siguiente Pregunta ➡️</button>
        </section>
    </main>

    <script src="js/service.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
